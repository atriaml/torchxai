name: "Publish"

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/torchxai-tools
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for setuptools-scm version inference

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Build
        run: uv build

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --index https://download.pytorch.org/whl/cpu --with dist/*.whl tests/smoke_test.py

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --index https://download.pytorch.org/whl/cpu --with dist/*.tar.gz tests/smoke_test.py

      - name: Publish
        run: uv publish
