      - metrics/input_invariance.md
      - metrics/non_sensitivity.md
    - Faithfulness:
      - metrics/aopc.md
      - metrics/abpc.md
      - metrics/faithfulness_corr.md
      - metrics/faithfulness_estimate.md
      - metrics/infidelity.md
      - metrics/monotonicity.md
      - metrics/monotonicity_corr.md
      - metrics/sensitivity_n.md
    - Complexity:
      - metrics/complexity_entropy.md
      - metrics/complexity_sundararajan.md
      - metrics/effective_complexity.md
      - metrics/sparseness.md
    - Robustness:
      - metrics/sensitivity_max.md
      - metrics/sensitivity_avg.md
    - Diagnosis:
      - metrics/attribution_localization.md
      - metrics/attribution_locality.md
      - metrics/modality_topk_fraction.md
      - metrics/attribution_text_analysis.md